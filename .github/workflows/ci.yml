name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: mise :biome
      - run: mise :verify
      - run: mise //...:build

  changeset:
    # The Version Packages PR is *built by* `changeset version`, which consumes
    # the changeset files it releases — so on that branch "changed packages,
    # no changesets" is the expected state, not a missing changeset.
    if: ${{ !startsWith(github.head_ref, 'changeset-release/') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
      # Fails if a *publishable* package changed without a changeset.
      # If the change needs no release (tests, docs, refactor), record that with:
      #   changeset add --empty
      - run: changeset status --since=origin/main

name: deploy

# Reusable deploy for Plexus apps (PLEXUS.md §5). Mounts the stateless deploy verb
# (scripts/deploy.sh) on the push event; the tenant supplies the host + SSH key.
# Apps reference it after app-ci:
#
#   deploy:
#     needs: ci
#     if: github.ref == 'refs/heads/main'
#     uses: plexus-ms/library/.github/workflows/deploy.yml@v1
#     with:
#       app: plexus-website
#       image: ${{ needs.ci.outputs.image }}
#       host: deploy@178.105.240.160
#     secrets:
#       ssh-key: ${{ secrets.DEPLOY_SSH_KEY }}

on:
  workflow_call:
    inputs:
      app:
        required: true
        type: string
      image:
        description: Full image ref to deploy (name:tag), e.g. app-ci's output.
        required: true
        type: string
      host:
        description: SSH target, e.g. deploy@1.2.3.4.
        required: true
        type: string
      health-url:
        description: Healthcheck URL polled on the host. Defaults to the §4 path.
        required: false
        type: string
        default: ''
      library-ref:
        description: Tag/branch of plexus-ms/library providing the deploy verb.
        required: false
        type: string
        default: v1
    secrets:
      ssh-key:
        description: Private key authorized as the deploy user on the host.
        required: true

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch the deploy verb from the library
        uses: actions/checkout@v7
        with:
          repository: plexus-ms/library
          ref: ${{ inputs.library-ref }}
      - name: Load SSH key
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          eval "$(ssh-agent -s)"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> "$GITHUB_ENV"
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> "$GITHUB_ENV"
          printf '%s\n' "${{ secrets.ssh-key }}" | ssh-add -
      - name: Deploy
        env:
          PLEXUS_HEALTH_URL: ${{ inputs.health-url }}
        run: bash scripts/deploy.sh '${{ inputs.host }}' '${{ inputs.app }}' '${{ inputs.image }}'

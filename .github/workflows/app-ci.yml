name: app-ci

# Reusable CI for Plexus apps (PLEXUS.md §5): lint → typecheck → test → build &
# push a container image to the caller's GHCR namespace, tagged with the git SHA.
# Apps reference it in ~5 lines:
#
#   jobs:
#     ci:
#       uses: plexus-ms/library/.github/workflows/app-ci.yml@v1
#       with: { app: plexus-website }

on:
  workflow_call:
    inputs:
      app:
        description: Workspace app name (pnpm filter + mise dir under apps/).
        required: true
        type: string
      image-name:
        description: Image name under the caller's GHCR org. Defaults to `app`.
        required: false
        type: string
        default: ''
      dockerfile:
        description: Dockerfile path. Defaults to apps/<app>/Dockerfile.
        required: false
        type: string
        default: ''
      push:
        description: Build and push the image (set false for PRs).
        required: false
        type: boolean
        default: true
    outputs:
      image:
        description: Full image ref that was built (name:sha).
        value: ${{ jobs.image.outputs.image }}

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: mise run lint
      - run: mise run '//...:typecheck'
      - run: mise run '//...:test'

  image:
    needs: check
    if: ${{ inputs.push }}
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v7
      - id: meta
        # Image lives under the CALLER's org so the repo's own GITHUB_TOKEN can
        # push it (no cross-org PAT). Tenant app → tenant-org registry.
        run: |
          name='${{ inputs.image-name }}'
          [ -n "$name" ] || name='${{ inputs.app }}'
          owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')
          echo "image=ghcr.io/$owner/$name:${{ github.sha }}" >> "$GITHUB_OUTPUT"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ inputs.dockerfile != '' && inputs.dockerfile || format('apps/{0}/Dockerfile', inputs.app) }}
          push: true
          tags: ${{ steps.meta.outputs.image }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
